name: CI PR

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov hypothesis ruff

      - name: Run validation harness MVP tests
        run: |
          python -m pytest \
            tests/test_cli.py \
            tests/test_analysis_report.py \
            tests/test_formatting_pass.py \
            tests/test_parse_only_validation.py \
            tests/test_rewrite_registry.py \
            tests/test_dependency_graph.py \
            tests/test_extract_ctes.py \
            tests/test_parse_sql.py \
            tests/test_risk_classifier.py \
            -q \
            -o addopts= \
            -p no:asyncio

      - name: Run lint (package surface)
        run: |
          ruff check src/agentic_sql_converter
